name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Test (Core)
        run: dotnet test "OwO Maker.Core.Tests/OwO Maker.Core.Tests.csproj" -c Release

      - name: Build (x86 Release)
        run: dotnet build "OwO Maker/OwO Maker.csproj" -c Release -p:Platform=x86

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OwO-Maker-x86
          path: "OwO Maker/bin/x86/Release/net8.0-windows/"
          if-no-files-found: error
